<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 - 个人博客</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="/css/common.css">
    <script src="/js/config.js"></script>
    <script src="/js/common.js"></script>
    <style>
        .main-content { max-width: 900px; margin: 6rem auto 2rem; padding: 0 16px; }
        .version-wrapper { display: flex; flex-direction: column; gap: 16px; }
        .title { font-size: 20px; font-weight: 600; color: #333; }
        .version-card { background: #fff; border: 1px solid #e9ecef; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.06); padding: 20px; }
        .version-title { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 8px; }
        .release-notes { font-size: 14px; color: #555; margin-top: 8px; white-space: pre-wrap; }
        .meta { font-size: 12px; color: #777; margin-top: 8px; }
        .download-btn { display: inline-block; background: #1890ff; color: #fff; text-decoration: none; padding: 10px 16px; border-radius: 8px; border: 1px solid #0f6bdc; font-weight: 600; }
    </style>
    </head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">szhAo-blog</a>
            <button class="menu-toggle" aria-label="切换菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/tools.html">工具集</a>
                <a href="/chat.html" class="active">聊天</a>
                <a href="/message.html">留言</a>
                <a href="/about.html">关于</a>
            </div>
            <div class="auth-buttons">
                <button class="btn-outline" id="loginBtn">登录</button>
                <button class="btn-primary" id="registerBtn">注册</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="version-wrapper">
            <div class="title">新的聊天功能已移植安卓版本</div>
            <div id="versionBox" class="version-card">正在获取最新版本...</div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="/">首页</a> |
                <a href="/message.html">留言</a> |
                <a href="/about.html">关于</a> |
                <span>© 2024 个人博客</span>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const box = document.getElementById('versionBox');
            try {
                const res = await fetch('https://android.szhaovo.cn/api/versions/latest', { cache: 'no-store' });
                const j = await res.json();
                if (j && j.data) {
                    const d = j.data;
                    const sizeMB = d.file_size ? (d.file_size / 1024 / 1024).toFixed(2) : '';
                    box.innerHTML = `
                        <div class="version-title">最新版本 ${d.version_name} (${d.version_code})</div>
                        <a class="download-btn" href="${d.apk_url}" target="_blank" rel="noopener noreferrer">下载 APK</a>
                        <div class="release-notes">${d.release_notes || ''}</div>
                        <div class="meta">${sizeMB ? `大小 ${sizeMB} MB · ` : ''}目标SDK ${d.target_sdk_version}</div>
                    `;
                } else {
                    box.textContent = '未获取到版本信息';
                }
            } catch (e) {
                box.textContent = '获取版本信息失败';
            }
        });
    </script>
</body>
</html>
