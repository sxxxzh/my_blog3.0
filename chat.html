<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 - 个人博客</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="/css/common.css">
    <script src="/js/config.js"></script>
    <script src="/js/common.js"></script>
    <style>
        .main-content { max-width: 1200px; margin: 6rem auto 2rem; padding: 0 16px; }
        .title { font-size: 24px; font-weight: 600; color: #333; text-align: center; margin-bottom: 32px; }
        
        /* 按钮网格布局 */
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 32px; }
        .action-card { background: #fff; border: 1px solid #e9ecef; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.06); padding: 24px; text-align: center; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; }
        .action-card:hover { transform: translateY(-2px); box-shadow: 0 8px 12px rgba(0,0,0,0.1); }
        .action-icon { font-size: 48px; margin-bottom: 16px; }
        .action-title { font-size: 20px; font-weight: 600; color: #222; margin-bottom: 8px; }
        .action-description { font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.5; }
        .action-btn { background: #1890ff; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .action-btn:hover { background: #0f6bdc; transform: translateY(-1px); }
        .action-btn:disabled { background: #d9d9d9; color: #999; cursor: not-allowed; transform: none; }
        
        /* 手机预览区域样式 - 全屏模式 */
        .phone-section { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 1000; }
        .phone-section.active { display: block; }
        .phone-close { position: absolute; top: 20px; right: 20px; background: #fff; color: #333; border: 1px solid #ddd; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 18px; }
        .phone-close:hover { background: #f0f0f0; transform: translateY(-1px); }
        
        /* 全屏iframe容器 */
        .iframe-container { width: 100%; height: 100%; background: #fff; }
        .chat-iframe { width: 100%; height: 100%; border: none; display: block; }
        .iframe-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #999; font-size: 16px; }
        .iframe-error { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #ff4d4f; font-size: 16px; }
        
        /* 版本信息样式 */
        .version-info { background: #f8f9fa; border-radius: 8px; padding: 16px; margin-top: 16px; }
        .version-title { font-size: 16px; font-weight: 600; color: #222; margin-bottom: 8px; }
        .release-notes { font-size: 13px; color: #555; margin-top: 8px; white-space: pre-wrap; }
        .meta { font-size: 12px; color: #777; margin-top: 8px; }
        .loading { text-align: center; color: #777; font-size: 14px; }
        .error { text-align: center; color: #ff4d4f; font-size: 14px; }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .button-grid { grid-template-columns: 1fr; gap: 16px; }
            .main-content { margin-top: 4rem; padding: 0 12px; }
            .action-card { padding: 20px; }
            .action-icon { font-size: 40px; margin-bottom: 12px; }
            .action-title { font-size: 18px; }
            .action-description { font-size: 13px; margin-bottom: 16px; }
            .action-btn { padding: 10px 20px; font-size: 14px; }
        }
        
        @media (max-width: 480px) {
            .main-content { margin-top: 3rem; padding: 0 8px; }
            .title { font-size: 20px; margin-bottom: 24px; }
            .action-card { padding: 16px; }
            .action-icon { font-size: 36px; margin-bottom: 10px; }
            .action-title { font-size: 16px; margin-bottom: 6px; }
            .action-description { font-size: 12px; margin-bottom: 14px; }
            .action-btn { padding: 8px 16px; font-size: 13px; }
        }
        
        @media (max-width: 390px) {
            .button-grid { gap: 12px; }
            .action-card { padding: 14px; }
            .action-icon { font-size: 32px; }
        }
    </style>
    </head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">szhAo-blog</a>
            <button class="menu-toggle" aria-label="切换菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/tools.html">工具集</a>
                <a href="/chat.html" class="active">聊天</a>
                <a href="/message.html">留言</a>
                <a href="/about.html">关于</a>
            </div>
            <div class="auth-buttons">
                <button class="btn-outline" id="loginBtn">登录</button>
                <button class="btn-primary" id="registerBtn">注册</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="title">聊天体验</h1>
        
        <!-- 两个按钮区域 -->
        <div id="buttonContainer" class="button-grid">
            <div class="action-card" id="androidCard">
                <div class="action-icon">📱</div>
                <div class="action-title">安卓版本</div>
                <div class="action-description">下载安卓应用，享受原生体验</div>
                <button class="action-btn" id="downloadApk">下载 APK</button>
                <div id="androidVersion" class="version-info" style="display: none;">
                    <div class="version-title">正在获取最新版本...</div>
                </div>
            </div>

            <div class="action-card" id="previewCard">
                <div class="action-icon">👁️</div>
                <div class="action-title">预览</div>
                <div class="action-description">预览聊天界面效果</div>
                <button class="action-btn" id="previewBtn">预览效果</button>
            </div>
        </div>

        <!-- 手机模型展示区域 -->
        <div id="phoneSection" class="phone-section" style="display: none;"></div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="/">首页</a> |
                <a href="/message.html">留言</a> |
                <a href="/about.html">关于</a> |
                <span>© 2024 个人博客</span>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 获取安卓版本信息
            const androidVersionEl = document.getElementById('androidVersion');
            const downloadApkBtn = document.getElementById('downloadApk');
            
            try {
                const res = await fetch('https://android.szhaovo.cn/api/versions/latest', { cache: 'no-store' });
                const j = await res.json();
                if (j && j.data) {
                    const d = j.data;
                    const sizeMB = d.file_size ? (d.file_size / 1024 / 1024).toFixed(2) : '';
                    androidVersionEl.innerHTML = `
                        <div class="version-title">最新版本 ${d.version_name} (${d.version_code})</div>
                        <div class="release-notes">${d.release_notes || ''}</div>
                        <div class="meta">${sizeMB ? `大小 ${sizeMB} MB · ` : ''}目标SDK ${d.target_sdk_version}</div>
                    `;
                    androidVersionEl.style.display = 'block';
                    downloadApkBtn.href = d.apk_url;
                    downloadApkBtn.target = '_blank';
                    downloadApkBtn.rel = 'noopener noreferrer';
                } else {
                    androidVersionEl.innerHTML = '<div class="error">未获取到版本信息</div>';
                    androidVersionEl.style.display = 'block';
                }
            } catch (e) {
                androidVersionEl.innerHTML = '<div class="error">获取版本信息失败</div>';
                androidVersionEl.style.display = 'block';
            }

            // 预览功能
            const previewBtn = document.getElementById('previewBtn');
            const phoneSection = document.getElementById('phoneSection');
            
            // 获取本地token的函数
            function getLocalToken() {
                // 尝试从localStorage获取token
                const token = localStorage.getItem('token') || 
                             localStorage.getItem('authToken') || 
                             localStorage.getItem('userToken');
                
                if (token) {
                    return token;
                }
                
                // 尝试从sessionStorage获取token
                const sessionToken = sessionStorage.getItem('token') || 
                                   sessionStorage.getItem('authToken') || 
                                   sessionStorage.getItem('userToken');
                
                return sessionToken || '';
            }

            // 创建全屏iframe预览
            function createPhoneModel(token) {
                // 隐藏标题和按钮区域，显示全屏iframe预览
                document.querySelector('.title').style.display = 'none';
                document.getElementById('buttonContainer').style.display = 'none';
                document.getElementById('phoneSection').style.display = 'block';
                
                // 创建全屏iframe HTML
                document.getElementById('phoneSection').innerHTML = `
                    <button class="phone-close" id="closePhone">✕</button>
                    <div class="iframe-container">
                        <div id="iframeLoading" class="iframe-loading">正在加载聊天界面...</div>
                        <div id="iframeError" class="iframe-error" style="display: none;">请先登录以启用Web聊天</div>
                        <iframe id="chatIframe" class="chat-iframe" style="display: none;"></iframe>
                    </div>
                `;
                
                // 绑定关闭按钮事件
                document.getElementById('closePhone').addEventListener('click', () => {
                    document.querySelector('.title').style.display = 'block';
                    document.getElementById('buttonContainer').style.display = 'grid';
                    document.getElementById('phoneSection').style.display = 'none';
                    document.getElementById('phoneSection').innerHTML = '';
                });
                
                // 加载iframe内容
                loadPhonePreview(token);
            }

            // 加载手机预览iframe
            function loadPhonePreview(token) {
                const chatIframe = document.getElementById('chatIframe');
                const iframeLoading = document.getElementById('iframeLoading');
                const iframeError = document.getElementById('iframeError');
                const baseUrl = 'https://newebchat.pages.dev/';
                
                if (token) {
                    iframeLoading.style.display = 'block';
                    iframeError.style.display = 'none';
                    chatIframe.style.display = 'none';
                    
                    const url = `${baseUrl}?token=${encodeURIComponent(token)}`;
                    chatIframe.src = url;
                    
                    chatIframe.onload = () => {
                        iframeLoading.style.display = 'none';
                        chatIframe.style.display = 'block';
                    };
                    
                    chatIframe.onerror = () => {
                        iframeLoading.style.display = 'none';
                        iframeError.style.display = 'block';
                        iframeError.textContent = '加载失败，请重试';
                    };
                } else {
                    iframeLoading.style.display = 'none';
                    iframeError.style.display = 'block';
                    chatIframe.style.display = 'none';
                    iframeError.textContent = '请先登录以启用Web聊天';
                }
            }

            // 检查token并更新UI状态
            function checkTokenAndUpdateUI() {
                const token = getLocalToken();
                return token;
            }

            // 预览按钮点击事件
            previewBtn.addEventListener('click', () => {
                const token = getLocalToken();
                createPhoneModel(token);
            });

            // 安卓下载按钮事件
            downloadApkBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                // 触发下载逻辑
                if (downloadApkBtn.href && downloadApkBtn.href !== '#') {
                    window.open(downloadApkBtn.href, '_blank');
                }
            });

            // 初始检查token状态
            checkTokenAndUpdateUI();

            // 定期检查token状态（可选）
            setInterval(checkTokenAndUpdateUI, 5000); // 每5秒检查一次
        });
    </script>
</body>
</html>
